os: linux
dist: focal
language: ruby
rvm:
  - 3.2.2  # Matching your GitHub Actions Ruby version

branches:
  only:
    - master

cache:
  bundler: true
  pip: true
  npm: true
  directories:
    - ~/.npm
    - vendor/bundle

before_install:
  # Install Python and pip
  - sudo apt-get update
  - sudo apt-get install -y python3-pip
  # Install ImageMagick and setup policy
  - sudo apt-get install -y imagemagick
  - sudo mkdir -p /etc/ImageMagick-6
  - sudo cp policy.xml /etc/ImageMagick-6/policy.xml
  # Setup Ruby
  - gem install bundler
  - bundle config set path 'vendor/bundle'
  # Setup Node.js
  - nvm install 16
  - nvm use 16
  - npm install -g purgecss

install:
  - bundle install
  - pip3 install --upgrade jupyter

script:
  # Set production environment
  - export JEKYLL_ENV=production
  # Build site
  - bundle exec jekyll build
  # Purge unused CSS
  - purgecss -c purgecss.config.js

deploy:
  provider: pages
  strategy: git
  cleanup: false
  token: $GITHUB_TOKEN  # Make sure to set this in Travis CI settings
  local_dir: _site
  target_branch: gh-pages
  keep_history: true
  edge: true
  on:
    branch: master
