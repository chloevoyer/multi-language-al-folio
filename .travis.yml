language: ruby
rvm:
  - 3.0.0  # Updated from 2.7 to 3.0.0 for Bundler compatibility

# Only build these branches
branches:
  only:
    - master

# Cache bundler dependencies
cache:
  bundler: true
  directories:
    - $TRAVIS_BUILD_DIR/tmp/.htmlproofer

env:
  global:
    - NOKOGIRI_USE_SYSTEM_LIBRARIES=true

# Install dependencies
before_install:
  - gem install bundler
  - bundle config set path 'vendor/bundle'

install:
  - bundle install

# Build the site
script:
  - bundle exec jekyll build

# Deploy to GitHub Pages
deploy:
  provider: pages
  skip_cleanup: true
  token: $GITHUB_TOKEN
  local_dir: _site
  target_branch: gh-pages
  keep_history: true
  on:
    branch: master
