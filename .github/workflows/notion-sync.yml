name: Sync Notion Database
on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  sync-notion-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install notion-client

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: "3ad05bf6976844ce82b360c234b3f0e0"
        run: |
          cat > fetch_notion.py << 'EOF'
          import os
          import json
          from notion_client import Client
          from datetime import datetime

          # Initialize the client
          notion = Client(auth=os.environ["NOTION_TOKEN"])
          database_id = os.environ["DATABASE_ID"]

          # Query the database
          results = notion.databases.query(
              database_id=database_id,
              sorts=[{
                  "property": "Date",
                  "direction": "ascending"
              }]
          ).get("results")

          # Transform to desired format
          conferences = []
          for page in results:
              props = page["properties"]

              # Helper function to safely get text content
              def get_text(prop_name):
                  prop = props.get(prop_name, {})
                  if prop.get("rich_text") and len(prop["rich_text"]) > 0:
                      return prop["rich_text"][0]["text"]["content"]
                  return ""

              # Helper function to get title
              def get_title(prop_name):
                  prop = props.get(prop_name, {})
                  if prop.get("title") and len(prop["title"]) > 0:
                      return prop["title"][0]["text"]["content"]
                  return ""

              # Helper function to get date
              def get_date(prop_name):
                  prop = props.get(prop_name, {})
                  if prop.get("date"):
                      return prop["date"]["start"] or ""  # Return empty string if None
                  return ""

              # Helper function to get select value
              def get_select(prop_name):
                  prop = props.get(prop_name, {})
                  if prop.get("select"):
                      return prop["select"].get("name", "")
                  return ""

              conference = {
                  "name": get_title("Conference Name"),
                  "acronym": get_select("Acronym"),
                  "date": get_date("Event Date"),
                  "submission_deadline": get_date("Submission Deadline"),
                  "location": get_text("Location"),
                  "local_abroad": get_select("Local vs. Abroad"),
                  "modality": get_select("Modality"),
                  "discipline": get_select("Discipline"),
                  "theme": get_text("Theme"),
                  "url": props.get("URL", {}).get("url", "")
              }
              conferences.append(conference)

          # Save to JSON file with proper encoding
          with open("_data/conferences.json", "w", encoding="utf-8") as f:
              json.dump({"conferences": conferences}, f, indent=2, ensure_ascii=False)
          python fetch_notion.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-action@users.noreply.github.com"
          git config --global user.name "GitHub Action"
          git add _data/conferences.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update conferences data" && git push)
