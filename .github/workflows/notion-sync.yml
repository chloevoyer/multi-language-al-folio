name: Sync Notion Database
on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:  # Allows manual trigger

jobs:
  sync-notion-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          pip install notion-client
          
      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          cat > fetch_notion.py << 'EOF'
          import os
          import json
          from notion_client import Client
          from datetime import datetime
          
          # Initialize the client
          notion = Client(auth=os.environ["NOTION_TOKEN"])
          database_id = os.environ["DATABASE_ID"]
          
          # Query the database
          results = notion.databases.query(
              database_id=database_id,
              sorts=[{
                  "property": "Start",
                  "direction": "ascending"
              }]
          ).get("results")
          
          # Transform to desired format
          conferences = []
          for page in results:
              props = page["properties"]
              
              # Helper function to safely get text content
              def get_text(prop_name):
                  prop = props.get(prop_name, {})
                  if prop.get("rich_text") and len(prop["rich_text"]) > 0:
                      return prop["rich_text"][0]["text"]["content"]
                  return ""
              
              # Helper function to get title
              def get_title(prop_name):
                  prop = props.get(prop_name, {})
                  if prop.get("title") and len(prop["title"]) > 0:
                      return prop["title"][0]["text"]["content"]
                  return ""
              
              # Helper function to get date
              def get_date(prop_name):
                  prop = props.get(prop_name, {})
                  if prop.get("date"):
                      return prop["date"]["start"]
                  return None
              
              conference = {
                  "name": get_title("Name"),
                  "start_date": get_date("Start"),
                  "end_date": get_date("End"),
                  "location": get_text("Location"),
                  "city": get_text("City"),
                  "country": get_text("Country"),
                  "url": props.get("URL", {}).get("url", ""),
                  "status": props.get("Status", {}).get("status", {}).get("name", ""),
                  "application_deadline": get_date("Application deadline"),
                  "notification": get_date("Notification"),
                  "acceptance_type": props.get("Type", {}).get("select", {}).get("name", ""),
                  "topics": [tag["name"] for tag in props.get("Topic", {}).get("multi_select", [])],
                  "format": props.get("Format", {}).get("select", {}).get("name", ""),
                  "comments": get_text("Comments")
              }
              conferences.append(conference)
              
          # Save to JSON file
          with open("_data/conferences.json", "w") as f:
              json.dump({"conferences": conferences}, f, indent=2)
          EOF
          
          python fetch_notion.py
          
      - name: Commit and push if changed
        run: |
          git config --global user.email "github-action@users.noreply.github.com"
          git config --global user.name "GitHub Action"
          git add _data/conferences.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update conferences data" && git push)