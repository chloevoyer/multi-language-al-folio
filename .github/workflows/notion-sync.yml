name: Sync Notion Database
on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  sync-notion-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install notion-client

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          cat > fetch_notion.py << 'EOF'
          import os
          import json
          from notion_client import Client

          # Initialize the Notion client
          notion = Client(auth=os.environ["NOTION_TOKEN"])
          database_id = os.environ["DATABASE_ID"]

          # Query the Notion database
          results = notion.databases.query(
              database_id=database_id,
              sorts=[{"property": "Event Date", "direction": "descending"}]
          ).get("results")

          # Helper functions
          def get_text(prop_name, props):
              prop = props.get(prop_name, {})
              if prop.get("rich_text") and len(prop["rich_text"]) > 0:
                  return prop["rich_text"][0]["text"]["content"]
              return ""

          def get_title(prop_name, props):
              prop = props.get(prop_name, {})
              if prop.get("title") and len(prop["title"]) > 0:
                  return prop["title"][0]["text"]["content"]
              return ""

          def get_date(prop_name, props):
              prop = props.get(prop_name, {})
              if prop.get("date"):
                  return prop["date"].get("start", None), prop["date"].get("end", None)
              return None, None

          def get_select(prop_name, props):
              prop = props.get(prop_name, {})
              if prop.get("select"):
                  return prop["select"].get("name", "")
              return ""

          # Process results
          conferences = []
          for page in results:
              props = page["properties"]

              start_date, end_date = get_date("Event Date", props)

              conference = {
                  "name": get_title("Conference Name", props),
                  "acronym": get_select("Acronym", props),
                  "start_date": start_date,
                  "end_date": end_date,  # Include end date
                  "submission_deadline": get_date("Submission Deadline", props)[0],
                  "location": get_text("Location", props),
                  "local_abroad": get_select("Local vs. Abroad", props),
                  "modality": get_select("Modality", props),
                  "field": get_select("Field", props),
                  "theme": get_text("Theme", props),
                  "url": props.get("URL", {}).get("url", ""),
              }

              # Remove empty values
              conference = {k: v for k, v in conference.items() if v is not None}
              conferences.append(conference)

          # Save the updated JSON file
          with open("_data/conferences.json", "w", encoding="utf-8") as f:
              json.dump({"conferences": conferences}, f, indent=2, ensure_ascii=False)
          EOF

          python fetch_notion.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-action@users.noreply.github.com"
          git config --global user.name "GitHub Action"
          git add _data/conferences.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update conferences data" && git push)
